
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>QDII ETF实时监控</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --ink: #172033;
        --muted: #64748b;
        --line: #d8e0eb;
        --head: #edf2f8;
        --green: #047857;
        --green-bg: #d9f7e8;
        --amber: #a35308;
        --red: #b42318;
        --blue: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(246, 248, 251, 0.96);
        backdrop-filter: blur(12px);
      }

      .bar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        max-width: 1480px;
        margin: 0 auto;
        padding: 18px 24px 14px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      button,
      select,
      input {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
      }

      button {
        padding: 0 14px;
        cursor: pointer;
        font-weight: 700;
      }

      select {
        padding: 0 32px 0 12px;
      }

      input {
        width: 180px;
        padding: 0 12px;
      }

      .holding-control {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 38px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
      }

      .holding-control span {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .holding-control input {
        width: 86px;
        height: 30px;
        border: 0;
        padding: 0;
        font-weight: 800;
      }

      .group-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-width: 1480px;
        margin: 0 auto;
        padding: 0 24px 14px;
      }

      .group-tab {
        border-color: var(--line);
        background: var(--panel);
      }

      .group-tab.active {
        border-color: #2563eb;
        background: #2563eb;
        color: #ffffff;
      }

      main {
        max-width: 1480px;
        margin: 0 auto;
        padding: 18px 24px 36px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px 16px;
      }

      .stat b {
        display: block;
        font-size: 22px;
        margin-bottom: 4px;
      }

      .stat span {
        color: var(--muted);
        font-size: 13px;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      table {
        width: 100%;
        min-width: 1780px;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 12px 10px;
        text-align: right;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--head);
        color: #334155;
        font-weight: 800;
        cursor: pointer;
        user-select: none;
      }

      th:first-child,
      td:first-child {
        position: sticky;
        left: 0;
        z-index: 3;
        min-width: 170px;
        max-width: 190px;
        background: var(--panel);
        text-align: left;
        box-shadow: 1px 0 0 var(--line);
      }

      th:first-child {
        z-index: 4;
        background: var(--head);
      }

      th:nth-child(2),
      td:nth-child(2) {
        text-align: center;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      .rank {
        color: #64748b;
        font-weight: 800;
      }

      .name {
        font-weight: 850;
        line-height: 1.28;
      }

      .code {
        color: #64748b;
        font-size: 12px;
      }

      .positive {
        color: var(--green);
        font-weight: 850;
      }

      .negative {
        color: var(--red);
        font-weight: 850;
      }

      .market-up {
        color: var(--red);
        font-weight: 850;
      }

      .market-down {
        color: var(--green);
        font-weight: 850;
      }

      .trend-cell {
        width: 140px;
        min-width: 140px;
      }

      .trend-box {
        position: relative;
        display: inline-flex;
        width: 118px;
        height: 42px;
        overflow: hidden;
        border-radius: 0;
        background: transparent;
      }

      .trend-line {
        position: relative;
        z-index: 1;
        height: 100%;
        overflow: hidden;
      }

      .trend-line svg {
        width: 118px;
        height: 100%;
        display: block;
      }

      .trend-box path.area {
        display: none;
      }

      .trend-box polyline {
        fill: none;
        stroke-width: 1.05;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .trend-box circle {
        display: none;
      }

      .trend-box.up {
        color: #f87171;
      }

      .trend-box.down {
        color: #34d399;
      }

      .trend-box.flat {
        color: #94a3b8;
      }

      .quote-stack {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 3px;
        line-height: 1.1;
      }

      .quote-price {
        color: var(--ink);
        font-size: 13px;
        font-weight: 850;
      }

      .quote-change {
        font-size: 13px;
        font-weight: 900;
      }

      .cheap {
        background: var(--green-bg);
        color: var(--green);
        font-weight: 850;
      }

      .warn {
        color: var(--amber);
        font-weight: 850;
      }

      .heat-top {
        background: #dcfce7;
        color: #047857;
        font-weight: 850;
      }

      .heat-mid {
        background: #eef6ff;
        color: #1d4ed8;
        font-weight: 850;
      }

      .heat-low {
        background: #fff7ed;
        color: #c2410c;
        font-weight: 850;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 54px;
        height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        background: #eef6ff;
        color: var(--blue);
        font-weight: 800;
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 760px) {
        body {
          background: #eef3f8;
          width: 100%;
          overflow-x: hidden;
        }

        header {
          position: static;
          max-width: 100vw;
          overflow: hidden;
        }

        .bar {
          grid-template-columns: 1fr;
          gap: 10px;
          width: 100%;
          max-width: 100vw;
          padding: max(12px, env(safe-area-inset-top)) 12px 10px;
        }

        .sub {
          display: -webkit-box;
          margin-top: 5px;
          overflow: hidden;
          -webkit-box-orient: vertical;
          -webkit-line-clamp: 2;
          font-size: 12px;
          line-height: 1.45;
        }

        .toolbar {
          display: grid;
          grid-template-columns: 1fr 1fr;
          justify-content: stretch;
          gap: 8px;
        }

        .holding-control {
          grid-column: 1 / -1;
          height: 42px;
        }

        .holding-control input {
          width: 100%;
        }

        button,
        select,
        input {
          width: 100%;
          min-width: 0;
          height: 42px;
          font-size: 14px;
        }

        .group-tabs {
          display: grid;
          grid-template-columns: 1fr;
          gap: 8px;
          width: 100vw;
          max-width: none;
          overflow: hidden;
          padding: 0 12px 10px;
        }

        .group-tab {
          width: 100%;
          min-width: 0;
          padding: 0 8px;
          font-size: 14px;
        }

        main {
          width: 100%;
          max-width: 100vw;
          overflow: hidden;
          padding: 12px 10px 28px;
        }

        .stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
          margin-bottom: 10px;
        }

        .stat {
          min-height: 76px;
          padding: 10px 12px;
          border-radius: 7px;
        }

        .stat b {
          font-size: 18px;
          line-height: 1.2;
          word-break: break-word;
        }

        .stat span {
          font-size: 12px;
        }

        .table-wrap {
          overflow: auto;
          max-width: 100%;
          border: 1px solid var(--line);
          background: var(--panel);
          -webkit-overflow-scrolling: touch;
        }

        table {
          min-width: 1500px;
          font-size: 12px;
        }

        th,
        td {
          padding: 9px 8px;
        }

        th:first-child,
        td:first-child {
          min-width: 132px;
          max-width: 132px;
        }

        td.fund-cell {
          background: var(--panel);
        }

        .name {
          overflow: hidden;
          font-size: 13px;
          text-overflow: ellipsis;
        }

        .code {
          margin-top: 2px;
          font-size: 12px;
        }

        .trend-cell {
          min-width: 116px;
          width: 116px;
        }

        .trend-box {
          width: 108px;
          height: 34px;
        }

        .trend-line svg {
          width: 108px;
        }

        .quote-stack {
          align-items: flex-end;
        }

        .quote-price {
          font-size: 15px;
        }

        .quote-change {
          font-size: 14px;
        }

        .status {
          padding: 0 4px;
          font-size: 12px;
        }

        h1 {
          font-size: 21px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <div>
          <h1>QDII ETF实时监控</h1>
          <div class="sub" id="subtitle">正在读取数据...</div>
        </div>
        <div class="toolbar">
          <label class="holding-control">
            <span>当前持有</span>
            <input id="holdingCode" type="text" inputmode="numeric" maxlength="6" placeholder="代码" />
          </label>
          <input id="search" type="search" placeholder="搜索名称/代码" />
          <select id="sortBy" aria-label="排序">
            <option value="relativeDeviation">按均值差排序</option>
            <option value="switchAdvantage">按切换优势排序</option>
            <option value="currentPremium">按当前溢价排序</option>
            <option value="adjustedPremium">按真实溢价排序</option>
            <option value="trackingDiff2026">按2026跟踪差排序</option>
            <option value="navReturn2026">按2026净值收益排序</option>
            <option value="changePct">按今日涨跌排序</option>
            <option value="avg7AmountWan">按7日成交排序</option>
          </select>
          <button id="refresh">刷新数据/行情</button>
        </div>
      </div>
      <div class="group-tabs" id="groupTabs" aria-label="ETF分组"></div>
    </header>

    <main>
      <section class="stats" aria-label="概览">
        <div class="stat"><b id="count">-</b><span>监控标的</span></div>
        <div class="stat"><b id="holding">-</b><span>当前持有</span></div>
        <div class="stat"><b id="best">-</b><span>当前相对最便宜</span></div>
        <div class="stat"><b id="premiumRange">-</b><span>当前溢价区间</span></div>
        <div class="stat"><b id="usdCny">-</b><span>实时汇率影响</span></div>
        <div class="stat"><b id="nqFuture">-</b><span id="futureLabel">实时期货</span></div>
        <div class="stat"><b id="updated">-</b><span>行情刷新时间</span></div>
      </section>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-key="name">基金名称</th>
              <th data-key="changePct">今日涨幅趋势</th>
              <th data-key="changePct">今日实时涨跌幅</th>
              <th id="currentPremiumHead" data-key="currentPremium">当前溢价率</th>
              <th data-key="usdCnyChangePct">实时汇率影响</th>
              <th data-key="nqFutureChangePct">实时对应期货</th>
              <th data-key="avg7AmountWan">7日日均成交额</th>
              <th data-key="relativeDeviation">均值差</th>
              <th data-key="switchAdvantage">切换优势</th>
              <th data-key="adjustedPremium">真实溢价率</th>
              <th data-key="operatingFee">运作费率</th>
              <th data-key="avg10Premium">10日均值</th>
              <th data-key="avg20Premium">20日均值</th>
              <th data-key="avg30Premium">30日均值</th>
              <th data-key="navReturn2026">2026净值收益</th>
              <th data-key="trackingDiff2026">2026跟踪差</th>
              <th data-key="navReturn2025">2025净值收益</th>
              <th data-key="trackingDiff2025">2025跟踪差</th>
              <th data-key="latestPremium">最近收盘溢价</th>
              <th data-key="navForPremiumDate">溢价净值日</th>
              <th data-key="subscribeStatus">申购状态</th>
              <th data-key="navDate">净值日</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="status" id="status">-</div>
    </main>

    <script>
      const state = {
        funds: [],
        groups: {},
        quotes: new Map(),
        trends: new Map(),
        sortBy: "relativeDeviation",
        sortDir: 1,
        activeGroup: "nasdaq100",
        holdingCodes: {
          nasdaq100: "159660",
          sp500: "513500",
        },
        generatedAt: "",
        latestDate: "",
        macro: {
          usdCny: null,
          usdCnyChangePct: null,
          futures: {},
        },
      };

      const $ = (id) => document.getElementById(id);
      const REMOTE_DATA_BASE = "https://laoganbu1657-hash.github.io/nasdaq-etf-monitor";
      const ACTIVE_GROUP_STORAGE_KEY = "qdii-etf-monitor-active-group";
      const HOLDING_STORAGE_PREFIX = "qdii-etf-monitor-holding-code-";

      function loadActiveGroup() {
        try {
          return localStorage.getItem(ACTIVE_GROUP_STORAGE_KEY) || state.activeGroup;
        } catch {
          return state.activeGroup;
        }
      }

      function saveActiveGroup(group) {
        try {
          localStorage.setItem(ACTIVE_GROUP_STORAGE_KEY, group);
        } catch {
          // 本地文件模式下如果浏览器限制存储，页面仍可临时使用当前值。
        }
      }

      function loadHoldingCode(group) {
        try {
          return localStorage.getItem(`${HOLDING_STORAGE_PREFIX}${group}`) || state.holdingCodes[group] || "";
        } catch {
          return state.holdingCodes[group] || "";
        }
      }

      function saveHoldingCode(group, code) {
        try {
          localStorage.setItem(`${HOLDING_STORAGE_PREFIX}${group}`, code);
        } catch {
          // 本地文件模式下如果浏览器限制存储，页面仍可临时使用输入值。
        }
      }

      function normalizeCode(code) {
        const digits = String(code || "").replace(/\D/g, "").slice(0, 6);
        return digits.length === 6 ? digits : digits;
      }

      function fmtPct(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "-";
        return `${Number(value).toFixed(2)}%`;
      }

      function fmtPctPoint(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "-";
        const sign = value > 0 ? "+" : "";
        return `${sign}${Number(value).toFixed(2)}pct`;
      }

      function fmtAmount(wan) {
        if (wan === null || wan === undefined || Number.isNaN(wan)) return "-";
        return wan >= 10000 ? `${(wan / 10000).toFixed(2)}亿` : `${wan.toFixed(2)}万`;
      }

      function fmtPrice(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "-";
        return Number(value).toFixed(4);
      }

      function fmtLivePrice(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "-";
        return Number(value).toFixed(3);
      }

      function classForSigned(value, inverse = false) {
        if (value === null || value === undefined || Number.isNaN(value)) return "";
        const good = inverse ? value < 0 : value > 0;
        const bad = inverse ? value > 0 : value < 0;
        if (good) return "positive";
        if (bad) return "negative";
        return "";
      }

      function classForMarketChange(value) {
        if (value === null || value === undefined || Number.isNaN(value)) return "";
        if (value > 0) return "market-up";
        if (value < 0) return "market-down";
        return "";
      }

      function tradingProgressRatio(now = new Date()) {
        const minutes = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
        const morningStart = 9 * 60 + 30;
        const morningEnd = 11 * 60 + 30;
        const afternoonStart = 13 * 60;
        const afternoonEnd = 15 * 60;
        if (minutes <= morningStart) return 0.04;
        if (minutes <= morningEnd) return Math.max(0.04, (minutes - morningStart) / 240);
        if (minutes <= afternoonStart) return 0.5;
        if (minutes <= afternoonEnd) return 0.5 + (minutes - afternoonStart) / 240;
        return 1;
      }

      function sampledTrend(points, stepMinutes = 2) {
        const result = [];
        let lastBucket = null;
        points.forEach((point) => {
          const bucket = Math.floor(point.minutes / stepMinutes);
          if (bucket !== lastBucket) {
            result.push(point);
            lastBucket = bucket;
          } else {
            result[result.length - 1] = point;
          }
        });
        return result;
      }

      function trendBars(fund) {
        const clean = Number.isFinite(fund.changePct) ? fund.changePct : 0;
        const direction = clean > 0 ? "up" : clean < 0 ? "down" : "flat";
        const progressPct = Math.round(tradingProgressRatio() * 100);
        const rawTrend = state.trends.get(fund.code) || [];
        const trend = sampledTrend(rawTrend).filter((point) => Number.isFinite(point.changePct));

        if (trend.length >= 2) {
          const values = trend.map((point) => point.changePct);
          const min = Math.min(...values);
          const max = Math.max(...values);
          const center = (min + max) / 2;
          const halfRange = Math.max((max - min) / 2, 0.18);
          const yMin = center - halfRange;
          const yMax = center + halfRange;
          const minMinute = 9 * 60 + 30;
          const maxMinute = 15 * 60;
          const width = 118;
          const height = 42;
          const padX = 4;
          const padY = 5;
          const points = trend
            .map((point) => {
              const x = padX + ((point.minutes - minMinute) / (maxMinute - minMinute)) * (width - padX * 2);
              const y = padY + ((yMax - point.changePct) / (yMax - yMin)) * (height - padY * 2);
              return `${x.toFixed(1)},${y.toFixed(1)}`;
            })
            .join(" ");
          const area = `M ${points.split(" ")[0]} L ${points} L ${width - padX},${height - padY} L ${padX},${height - padY} Z`;
          const latest = trend.at(-1);
          const title = `今日涨跌幅：${fmtPct(clean)}；2分钟趋势；区间：${fmtPct(min)} ~ ${fmtPct(max)}；最新点：${latest.time}`;
          return `<div class="trend-box ${direction}" title="${title}"><div class="trend-line" style="width:100%"><svg viewBox="0 0 ${width} ${height}" aria-hidden="true"><path class="area" d="${area}" fill="currentColor"></path><polyline points="${points}" stroke="currentColor"></polyline></svg></div></div>`;
        }

        const strength = Math.min(Math.abs(clean), 4) / 4;
        const upShape = [24, 18, 21, 13, 16, 11, 14, 10, 12, 8, 9, 7];
        const downShape = [8, 13, 11, 18, 16, 22, 20, 25, 23, 28, 26, 29];
        const flatShape = [19, 18, 20, 19, 18, 19, 20, 18, 19, 18, 19, 19];
        const base = direction === "up" ? upShape : direction === "down" ? downShape : flatShape;
        const points = base
          .map((y, index) => {
            const x = 6 + index * 9.6;
            const centerPull = (1 - strength) * 0.35;
            const adjustedY = y * (1 - centerPull) + 19 * centerPull;
            return `${x.toFixed(1)},${adjustedY.toFixed(1)}`;
          })
          .join(" ");
        const area = `M ${points.split(" ")[0]} L ${points} L 114,36 L 6,36 Z`;
        return `<div class="trend-box ${direction}" title="今日涨跌幅：${fmtPct(clean)}；正在等待2分钟趋势数据"><div class="trend-line" style="width:${progressPct}%"><svg viewBox="0 0 118 42" aria-hidden="true"><path class="area" d="${area}" fill="currentColor"></path><polyline points="${points}" stroke="currentColor"></polyline></svg></div></div>`;
      }

      function quoteStack(fund) {
        const marketClass = classForMarketChange(fund.changePct);
        return `<div class="quote-stack"><span class="quote-price">${fmtLivePrice(fund.livePrice)}</span><span class="quote-change ${marketClass}">${fmtPct(fund.changePct)}</span></div>`;
      }

      function classForRank(value, values, inverse = false) {
        if (value === null || value === undefined || Number.isNaN(value)) return "";
        const clean = values.filter((item) => Number.isFinite(item)).sort((a, b) => a - b);
        if (clean.length < 3) return classForSigned(value, inverse);
        const low = clean[Math.floor((clean.length - 1) * 0.33)];
        const high = clean[Math.floor((clean.length - 1) * 0.67)];
        const isTop = inverse ? value <= low : value >= high;
        const isLow = inverse ? value >= high : value <= low;
        if (isTop) return "heat-top";
        if (isLow) return "heat-low";
        return "heat-mid";
      }

      function secidFor(code) {
        return `${code.startsWith("5") ? "1" : "0"}.${code}`;
      }

      function sinaSymbolFor(code) {
        return `${code.startsWith("5") ? "sh" : "sz"}${code}`;
      }

      function getLivePrice(fund) {
        return state.quotes.get(fund.code)?.price || fund.latestClose;
      }

      function getLiveIopv(fund) {
        const quote = state.quotes.get(fund.code);
        if (quote && Number.isFinite(quote.iopv) && quote.iopv > 0) return quote.iopv;
        return null;
      }

      function getLiveChangePct(fund) {
        const quote = state.quotes.get(fund.code);
        if (quote && Number.isFinite(quote.changePct)) return quote.changePct;
        if (quote && Number.isFinite(quote.price) && Number.isFinite(fund.latestClose) && fund.latestClose > 0) {
          return (quote.price / fund.latestClose - 1) * 100;
        }
        return Number.isFinite(fund.latestChangePct) ? fund.latestChangePct : null;
      }

      function fallbackFxChangePct(funds = activeFunds()) {
        const found = funds.find((fund) => Number.isFinite(fund.estimateFxReturn));
        return found ? found.estimateFxReturn : null;
      }

      function enrich(fund) {
        const price = getLivePrice(fund);
        const changePct = getLiveChangePct(fund);
        const liveIopv = getLiveIopv(fund);
        const hasEtfComPremium = Number.isFinite(fund.etfComPremiumRate);
        const etfComIopv =
          hasEtfComPremium && Number.isFinite(fund.etfComLastPrice) && fund.etfComLastPrice > 0
            ? fund.etfComLastPrice / (1 + fund.etfComPremiumRate / 100)
            : null;
        const premiumNav = fund.navForReturn || fund.navForPremium || fund.nav || liveIopv || fund.etfComUnitNav || etfComIopv;
        const calculatedPremium = premiumNav > 0 ? (price / premiumNav - 1) * 100 : null;
        const currentPremium = calculatedPremium;
        const currentPremiumSource =
          fund.navForReturn || fund.navForPremium || fund.nav
            ? "估算当前溢价率（含汇率）"
            : liveIopv
              ? "估算当前溢价率（腾讯IOPV兜底）"
              : fund.etfComUnitNav
                ? "估算当前溢价率（ETF.com.cn净值兜底）"
                : "估算当前溢价率（ETF.com.cn溢价反推）";
        const future = state.macro.futures[fund.group] || {};
        const usdCnyChangePct = Number.isFinite(state.macro.usdCnyChangePct) ? state.macro.usdCnyChangePct : fallbackFxChangePct([fund]);
        const macroImpact =
          (Number.isFinite(usdCnyChangePct) ? usdCnyChangePct : 0) +
          (Number.isFinite(future.changePct) ? future.changePct : 0);
        const adjustedNav = premiumNav * (1 + macroImpact / 100);
        const adjustedPremium = adjustedNav > 0 ? (price / adjustedNav - 1) * 100 : calculatedPremium;
        return {
          ...fund,
          livePrice: price,
          changePct,
          premiumNav,
          etfComIopv,
          etfComPremium: hasEtfComPremium ? fund.etfComPremiumRate : null,
          calculatedPremium,
          currentPremium,
          currentPremiumSource,
          usdCnyChangePct,
          nqFutureChangePct: future.changePct,
          adjustedPremium,
          relativeDeviation:
            Number.isFinite(currentPremium) && Number.isFinite(fund.avg20Premium) ? currentPremium - fund.avg20Premium : null,
        };
      }

      function activeFunds() {
        return state.funds.filter((fund) => fund.group === state.activeGroup);
      }

      function enrichedFunds() {
        const all = activeFunds().map(enrich);
        const holdingCode = state.holdingCodes[state.activeGroup];
        const holding = all.find((fund) => fund.code === holdingCode);
        return all.map((fund) => ({
          ...fund,
          switchAdvantage:
            holding && Number.isFinite(holding.relativeDeviation) && Number.isFinite(fund.relativeDeviation)
              ? holding.relativeDeviation - fund.relativeDeviation
              : null,
          isHolding: holding ? fund.code === holding.code : false,
        }));
      }

      function sortedFunds() {
        const keyword = $("search").value.trim().toLowerCase();
        return enrichedFunds()
          .filter((fund) => !keyword || fund.name.toLowerCase().includes(keyword) || fund.code.includes(keyword))
          .sort((a, b) => {
            const key = state.sortBy;
            const av = a[key];
            const bv = b[key];
            if (typeof av === "string" || typeof bv === "string") {
              return String(av || "").localeCompare(String(bv || ""), "zh-Hans-CN") * state.sortDir;
            }
            return ((av ?? -999999) - (bv ?? -999999)) * state.sortDir;
          });
      }

      function loadJsonp(url, callbackName) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          const timer = setTimeout(() => {
            cleanup();
            reject(new Error("行情接口超时"));
          }, 9000);
          function cleanup() {
            clearTimeout(timer);
            script.remove();
            delete window[callbackName];
          }
          window[callbackName] = (data) => {
            cleanup();
            resolve(data);
          };
          script.onerror = () => {
            cleanup();
            reject(new Error("行情接口加载失败"));
          };
          script.src = url;
          document.body.appendChild(script);
        });
      }

      function loadScript(url, errorMessage) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          const timer = setTimeout(() => {
            cleanup();
            reject(new Error(errorMessage || "脚本加载超时"));
          }, 9000);
          function cleanup() {
            clearTimeout(timer);
            script.remove();
          }
          script.onload = () => {
            cleanup();
            resolve();
          };
          script.onerror = () => {
            cleanup();
            reject(new Error(errorMessage || "脚本加载失败"));
          };
          script.src = url;
          document.body.appendChild(script);
        });
      }

      async function refreshSinaQuotes() {
        const symbols = state.funds.map((fund) => sinaSymbolFor(fund.code));
        await loadScript(`https://hq.sinajs.cn/list=${symbols.join(",")}`, "新浪行情接口加载失败");
        state.funds.forEach((fund) => {
          const symbol = sinaSymbolFor(fund.code);
          const raw = window[`hq_str_${symbol}`];
          if (!raw) return;
          const fields = raw.split(",");
          const prevClose = Number(fields[2]);
          const price = Number(fields[3]);
          const amount = Number(fields[9]);
          if (!Number.isFinite(price) || price <= 0) return;
          state.quotes.set(fund.code, {
            price,
            changePct: Number.isFinite(prevClose) && prevClose > 0 ? (price / prevClose - 1) * 100 : fund.latestChangePct,
            amount: Number.isFinite(amount) ? amount : null,
          });
          delete window[`hq_str_${symbol}`];
        });
      }

      async function refreshTencentQuotes(funds) {
        const symbols = funds.map((fund) => sinaSymbolFor(fund.code));
        await loadScript(`https://qt.gtimg.cn/q=${symbols.join(",")}`, "腾讯行情接口加载失败");
        funds.forEach((fund) => {

          if (!raw) return;

              Number.isFinite(changePct) ? changePct : Number.isFinite(prevClose) && prevClose > 0 ? (price / prevClose - 1) * 100 : fund.latestChangePct,

      async function loadTencentFuture(symbol) {
        await loadScript(`https://qt.gtimg.cn/q=${symbol}`, "腾讯期货行情接口加载失败");

      async function loadSinaFuture(symbol) {
        await loadScript(`https://hq.sinajs.cn/list=${symbol}`, "新浪期货行情接口加载失败");
        const raw = window[`hq_str_${symbol}`];
        delete window[`hq_str_${symbol}`];
        if (!raw) throw new Error(`${symbol} 无行情数据`);
        const fields = raw.split(",");
        const price = Number(fields[0]);
        const prev = Number(fields[7]);
        if (!Number.isFinite(price) || price <= 0) throw new Error(`${symbol} 行情格式异常`);
        return {
          price,
          changePct: Number.isFinite(prev) && prev > 0 ? (price / prev - 1) * 100 : null,

      async function loadSinaUsdCny() {
        const symbol = "fx_susdcny";
        await loadScript(`https://hq.sinajs.cn/list=${symbol}`, "新浪美元人民币行情接口加载失败");
        const raw = window[`hq_str_${symbol}`];
        delete window[`hq_str_${symbol}`];
        if (!raw) throw new Error("新浪美元人民币无行情数据");
        const fields = raw.split(",");
        const price = Number(fields[1]);
        const changePct = Number(fields[10]);
        if (!Number.isFinite(price) || price <= 0) throw new Error("新浪美元人民币行情格式异常");
        return {
          price,
          prev: Number.isFinite(changePct) ? price / (1 + changePct / 100) : null,
          changePct: Number.isFinite(changePct) ? changePct : null,
        };
      }

      function parseTrendItem(raw, prevClose) {
        const fields = String(raw || "").split(",");
        const timeText = fields[0] || "";
        const timePart = timeText.split(" ")[1] || timeText;
        const [hour, minute] = timePart.split(":").map(Number);
        const close = Number(fields[2]);
        if (!Number.isFinite(hour) || !Number.isFinite(minute) || !Number.isFinite(close) || close <= 0 || !Number.isFinite(prevClose) || prevClose <= 0) {
          return null;
        }
        return {
          time: timePart.slice(0, 5),
          minutes: hour * 60 + minute,
          changePct: (close / prevClose - 1) * 100,
        };
      }

      async function loadIntradayTrend(fund) {
        const callbackName = `emTrend${Date.now()}${Math.floor(Math.random() * 10000)}`;
        const url =
          `https://push2his.eastmoney.com/api/qt/stock/trends2/get?secid=${secidFor(fund.code)}` +
          "&fields1=f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11,f12,f13" +
          "&fields2=f51,f52,f53,f54,f55,f56,f57,f58&iscr=0&iscca=0&ndays=1" +
          `&cb=${callbackName}`;
        const data = await loadJsonp(url, callbackName);
        const prevClose = Number(data?.data?.preClose || data?.data?.prePrice || state.quotes.get(fund.code)?.prev || fund.latestClose);
        const trend = (data?.data?.trends || []).map((item) => parseTrendItem(item, prevClose)).filter(Boolean);
        if (trend.length >= 2) {
          state.trends.set(fund.code, trend);
        }
      }

      async function refreshQuotes() {
        $("status").textContent = "正在刷新盘中行情...";
        state.quotes.clear();
        const chunks = [];
        const secids = state.funds.map((fund) => secidFor(fund.code));
        for (let i = 0; i < secids.length; i += 8) chunks.push(secids.slice(i, i + 8));

        try {
          for (const chunk of chunks) {
            const callbackName = `emQuote${Date.now()}${Math.floor(Math.random() * 10000)}`;
            const fields = "f12,f14,f2,f3,f5,f6";
            const url =
              `https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=${fields}` +
              `&secids=${chunk.join(",")}&cb=${callbackName}`;
            const data = await loadJsonp(url, callbackName);
            const list = data?.data?.diff || [];
            list.forEach((item) => {
              if (item.f12 && item.f2 && item.f2 !== "-") {
                state.quotes.set(String(item.f12).padStart(6, "0"), {
                  price: Number(item.f2),
                  changePct: Number(item.f3),
                  amount: Number(item.f6),
                });
              }
            });
          }
          if (state.quotes.size < state.funds.length) {
            const missingFunds = state.funds.filter((fund) => !state.quotes.has(fund.code));
            await refreshEastmoneySingleQuotes(missingFunds);
          }
          if (state.quotes.size < state.funds.length) {
            const missingFunds = state.funds.filter((fund) => !state.quotes.has(fund.code));
            await refreshTencentQuotes(missingFunds);
          }
          if (state.quotes.size < state.funds.length) {
            await refreshSinaQuotes();
          }
          $("status").textContent = `行情已刷新：${new Date().toLocaleString("zh-CN", { hour12: false })}`;
        } catch (error) {
          try {
            await refreshEastmoneySingleQuotes(state.funds);
            if (state.quotes.size < state.funds.length) {
              const missingFunds = state.funds.filter((fund) => !state.quotes.has(fund.code));
              await refreshTencentQuotes(missingFunds);
            }
            if (state.quotes.size < state.funds.length) {
              await refreshSinaQuotes();
            }
            $("status").textContent = `行情已刷新：${new Date().toLocaleString("zh-CN", { hour12: false })}（备用行情）`;
          } catch (fallbackError) {
            $("status").textContent = `实时行情刷新失败，已回退到最近收盘价：${error.message}`;
          }
        }
        render();
      }

        const url =
          `https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}` +
          `&fields=f43,f57,f58,f59,f60,f170&cb=${callbackName}`;
        const data = await loadJsonp(url, callbackName);
        const item = data?.data;
        if (!item || item.f43 === "-" || item.f43 === undefined) {
          throw new Error(`${secid} 无行情数据`);
        }
        const scale = 10 ** Number(item.f59 || 2);
        const price = Number(item.f43) / scale;
        const prev = Number(item.f60) / scale;
        const changePct = Number.isFinite(Number(item.f170)) ? Number(item.f170) / 100 : (price / prev - 1) * 100;
        return { price, prev, changePct };
      }

      function assertValidData(data) {
        if (!Array.isArray(data?.funds) || data.funds.length === 0) {
          throw new Error("基础数据为空，请检查 docs/data/funds.json 是否已上传");
        }
        return data;
      }

      function loadDataScript() {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.onload = () => {
            try {
              resolve(assertValidData(window.NASDAQ_ETF_FUNDS));
            } catch (error) {
              reject(error);
            } finally {
              script.remove();
            }
          };
          script.onerror = () => {
            script.remove();
            reject(new Error("基础数据脚本读取失败，请检查 docs/data/funds.js 是否存在"));
          };
          script.src = `./data/funds.js?t=${Date.now()}`;
          document.body.appendChild(script);
        });
      }

      async function loadData() {
        if (location.protocol === "file:") {
          try {
            const remoteResponse = await fetch(`${REMOTE_DATA_BASE}/data/funds.json?t=${Date.now()}`, { cache: "no-store" });
            if (!remoteResponse.ok) throw new Error(`线上基础数据读取失败：HTTP ${remoteResponse.status}`);
            return assertValidData(await remoteResponse.json());
          } catch (remoteError) {
            console.warn("线上数据读取失败，改用本地数据文件", remoteError);
          }
        }
        try {
          const response = await fetch(`./data/funds.json?t=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error(`基础数据读取失败：HTTP ${response.status}`);
          return assertValidData(await response.json());
        } catch (error) {
          console.warn("JSON 数据读取失败，改用 JS 数据文件", error);
          return loadDataScript();
        }
      }

      async function refreshBaseData({ silent = false } = {}) {
        if (!silent) $("status").textContent = "正在刷新基础数据...";
        const data = await loadData();
        state.funds = data.funds;
        state.groups = data.groups || {
          nasdaq100: { name: "纳指100", default_holding: "159660", future_secid: "103.NQ00Y" },
        };
        Object.entries(state.groups).forEach(([group, meta]) => {
          state.holdingCodes[group] = normalizeCode(loadHoldingCode(group)) || state.holdingCodes[group] || meta.default_holding || "";
        });
        state.activeGroup = state.groups[loadActiveGroup()] ? loadActiveGroup() : Object.keys(state.groups)[0];
        $("holdingCode").value = state.holdingCodes[state.activeGroup] || "";
        state.generatedAt = data.generatedAt;
        state.latestDate = data.latestDate;
        renderGroupTabs();
        render();
        if (!silent) $("status").textContent = `基础数据已刷新：${new Date().toLocaleString("zh-CN", { hour12: false })}`;
      }

      async function init() {
        await refreshBaseData();
        await refreshMacro();
        await refreshQuotes();
        await refreshTrendData();
        setInterval(async () => {
          await refreshMacro();
          await refreshQuotes();
        }, 60 * 1000);
        setInterval(async () => {
          await refreshTrendData();
        }, 2 * 60 * 1000);
        setInterval(async () => {
          try {
            await refreshBaseData({ silent: true });
            await refreshMacro();
            await refreshQuotes();
            await refreshTrendData();
          } catch (error) {
            console.warn("基础数据自动刷新失败", error);
          }
        }, 5 * 60 * 1000);
      }

      $("refresh").addEventListener("click", async () => {
        await refreshBaseData();
        await refreshMacro();
        await refreshQuotes();
        await refreshTrendData();
      });
      $("holdingCode").addEventListener("input", (event) => {
        const code = normalizeCode(event.target.value);
        event.target.value = code;
        state.holdingCodes[state.activeGroup] = code;
        if (code.length === 6) saveHoldingCode(state.activeGroup, code);
        render();
      });
      $("search").addEventListener("input", render);
      $("sortBy").addEventListener("change", (event) => {
        state.sortBy = event.target.value;
        state.sortDir = state.sortBy === "relativeDeviation" ? 1 : -1;
        render();
      });
      document.querySelectorAll("th[data-key]").forEach((th) => {
        th.addEventListener("click", () => {
          const key = th.dataset.key;
          if (state.sortBy === key) state.sortDir *= -1;
          else {
            state.sortBy = key;
            state.sortDir = key === "relativeDeviation" ? 1 : -1;
            $("sortBy").value = Array.from($("sortBy").options).some((option) => option.value === key)
              ? key
              : state.sortBy;
          }
          render();
        });
      });

      if ("serviceWorker" in navigator && location.protocol === "https:") {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      }

      init().catch((error) => {
        $("subtitle").textContent = "数据读取失败";
        $("status").textContent = error.message;
        $("tbody").innerHTML = `<tr><td colspan="22" class="warn">数据读取失败：${error.message}</td></tr>`;
      });
    </script>
  </body>
</html>
