name: Update QDII ETF Premium Data

on:
  workflow_dispatch:
  schedule:
    # Asia/Shanghai, Monday-Friday. Use off-hour retries because GitHub
    # scheduled workflows can be delayed or occasionally skipped.
    # US market usually closes around 04:00/05:00 Asia/Shanghai depending on
    # daylight saving time. Start early, then retry roughly every 2 hours.
    - cron: "17 21 * * 0-4"  # 05:17
    - cron: "17 23 * * 0-4"  # 07:17
    - cron: "17 1 * * 1-5"   # 09:17
    - cron: "17 3 * * 1-5"   # 11:17
    - cron: "17 5 * * 1-5"   # 13:17
    - cron: "17 7 * * 1-5"   # 15:17
    - cron: "15 10 * * 1-5"  # 18:15
    - cron: "35 11 * * 1-5"  # 19:35

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-update.txt

      - name: Install dependencies
        run: pip install -r requirements-update.txt

      - name: Update data
        run: python scripts/update_data.py

      - name: Build web data
        run: python scripts/build_web_data.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nasdaq_qdii_live_premium.csv data/summary.csv docs/data/funds.json docs/data/funds.js
          git diff --cached --quiet || git commit -m "Update QDII ETF premium data"
          git push
