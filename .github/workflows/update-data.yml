name: Update QDII ETF Premium Data

on:
  workflow_dispatch:
  schedule:
    # 08:35, 09:00, 09:20 and 19:30 Asia/Shanghai, Monday-Friday.
    # 09:00 updates the prior US trading day's estimated NAV before A-share open.
    # 09:20 is a retry window for US index data providers that publish the prior US close later.
    - cron: "35 0 * * 1-5"
    - cron: "0 1 * * 1-5"
    - cron: "20 1 * * 1-5"
    - cron: "30 11 * * 1-5"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-update.txt

      - name: Install dependencies
        run: pip install -r requirements-update.txt

      - name: Update data
        run: python scripts/update_data.py

      - name: Build web data
        run: python scripts/build_web_data.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nasdaq_qdii_live_premium.csv data/summary.csv docs/data/funds.json docs/data/funds.js
          git diff --cached --quiet || git commit -m "Update QDII ETF premium data"
          git push
