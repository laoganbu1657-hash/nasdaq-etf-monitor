name: Update QDII ETF Premium Data

on:
  workflow_dispatch:
  schedule:
    # Asia/Shanghai, Monday-Friday. Use off-hour retries because GitHub
    # scheduled workflows can be delayed or occasionally skipped.
    # Morning runs estimate the prior US trading day's NAV before/around A-share open.
    - cron: "37 0 * * 1-5"   # 08:37
    - cron: "7 1 * * 1-5"    # 09:07
    - cron: "27 1 * * 1-5"   # 09:27
    - cron: "7 2 * * 1-5"    # 10:07
    - cron: "7 3 * * 1-5"    # 11:07
    - cron: "7 7 * * 1-5"    # 15:07
    - cron: "15 10 * * 1-5"  # 18:15
    - cron: "35 11 * * 1-5"  # 19:35

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-update.txt

      - name: Install dependencies
        run: pip install -r requirements-update.txt

      - name: Update data
        run: python scripts/update_data.py

      - name: Build web data
        run: python scripts/build_web_data.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nasdaq_qdii_live_premium.csv data/summary.csv docs/data/funds.json docs/data/funds.js
          git diff --cached --quiet || git commit -m "Update QDII ETF premium data"
          git push
