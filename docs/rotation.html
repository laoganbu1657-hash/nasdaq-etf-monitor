<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>纳指ETF轮动收益工具</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --ink: #172033;
        --muted: #64748b;
        --line: #d8e0eb;
        --head: #edf2f8;
        --green: #047857;
        --red: #b42318;
        --blue: #2563eb;
        --amber: #a35308;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      header,
      main {
        max-width: 1320px;
        margin: 0 auto;
        padding: 18px 24px;
      }

      header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .nav {
        display: flex;
        gap: 8px;
      }

      a,
      button,
      select,
      input {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
      }

      a,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 14px;
        cursor: pointer;
        font-weight: 800;
        text-decoration: none;
      }

      .primary {
        border-color: var(--blue);
        background: var(--blue);
        color: #ffffff;
      }

      .danger {
        color: var(--red);
      }

      input,
      select {
        width: 100%;
        padding: 0 10px;
      }

      input[type="number"] {
        appearance: textfield;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .metric,
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric {
        padding: 14px 16px;
      }

      .metric b {
        display: block;
        margin-bottom: 4px;
        font-size: 22px;
      }

      .metric span,
      .hint,
      .status {
        color: var(--muted);
        font-size: 13px;
      }

      .panel {
        margin-bottom: 14px;
        overflow: hidden;
      }

      .panel-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfdff;
      }

      h2 {
        margin: 0;
        font-size: 16px;
        letter-spacing: 0;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 0.75fr 1.1fr 0.75fr 0.75fr 1.1fr 0.75fr 0.75fr;
        gap: 10px;
        padding: 14px 16px;
        align-items: end;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .form-actions {
        display: flex;
        gap: 8px;
        padding: 0 16px 14px;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        min-width: 1180px;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        text-align: right;
        white-space: nowrap;
      }

      th {
        background: var(--head);
        color: #334155;
        font-weight: 850;
      }

      th:first-child,
      td:first-child,
      th:nth-child(2),
      td:nth-child(2),
      th:nth-child(4),
      td:nth-child(4) {
        text-align: left;
      }

      .name {
        font-weight: 850;
      }

      .code {
        color: var(--muted);
        font-size: 12px;
      }

      .positive {
        color: var(--green);
        font-weight: 850;
      }

      .negative {
        color: var(--red);
        font-weight: 850;
      }

      .warn {
        color: var(--amber);
        font-weight: 850;
      }

      .empty {
        padding: 16px;
        color: var(--muted);
        font-size: 13px;
      }

      .status {
        margin-top: 10px;
      }

      @media (max-width: 760px) {
        header,
        main {
          max-width: 100vw;
          padding: 12px;
        }

        header {
          grid-template-columns: 1fr;
        }

        .nav {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
        }

        .metric {
          padding: 10px 12px;
        }

        .metric b {
          font-size: 18px;
        }

        .panel-head {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .form-grid {
          grid-template-columns: 1fr 1fr;
          padding: 12px;
          gap: 8px;
        }

        .field:first-child {
          grid-column: 1 / -1;
        }

        .field:nth-child(5) {
          grid-column: 1 / -1;
        }

        .form-actions {
          display: grid;
          grid-template-columns: 1fr;
          padding: 0 12px 12px;
        }

        table {
          min-width: 1120px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>纳指ETF轮动收益工具</h1>
        <div class="hint">每次换仓后，按实时价格计算相对“不操作继续持有原基金”的超额收益。</div>
      </div>
      <div class="nav">
        <a href="./index.html">返回监控</a>
        <button id="refresh" type="button" class="primary">刷新价格/收益</button>
      </div>
    </header>

    <main>
      <section class="summary" aria-label="轮动汇总">
        <div class="metric"><b id="totalExcess">-</b><span>累计超额收益</span></div>
        <div class="metric"><b id="totalRate">-</b><span>累计超额收益率</span></div>
        <div class="metric"><b id="recordCount">0</b><span>历史轮动次数</span></div>
        <div class="metric"><b id="updated">-</b><span>行情刷新时间</span></div>
      </section>

      <section class="panel" aria-label="新增轮动">
        <div class="panel-head">
          <h2>记录一次轮动</h2>
          <div class="hint">现金差额会自动计入：原数量×卖出价 - 换入数量×买入价。</div>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="tradeDate">日期</label>
            <input id="tradeDate" type="date" />
          </div>
          <div class="field">
            <label for="fromCode">原持有基金</label>
            <select id="fromCode"></select>
          </div>
          <div class="field">
            <label for="fromQty">原数量</label>
            <input id="fromQty" type="number" min="0" step="1" placeholder="如 10000" />
          </div>
          <div class="field">
            <label for="fromPrice">卖出价</label>
            <input id="fromPrice" type="number" min="0" step="0.001" placeholder="如 2.315" />
          </div>
          <div class="field">
            <label for="toCode">换入基金</label>
            <select id="toCode"></select>
          </div>
          <div class="field">
            <label for="toQty">换入数量</label>
            <input id="toQty" type="number" min="0" step="1" placeholder="如 9500" />
          </div>
          <div class="field">
            <label for="toPrice">买入价</label>
            <input id="toPrice" type="number" min="0" step="0.001" placeholder="如 2.438" />
          </div>
        </div>
        <div class="form-actions">
          <button id="addTrade" type="button" class="primary">保存轮动记录</button>
          <button id="exportCsv" type="button">导出CSV</button>
        </div>
      </section>

      <section class="panel" aria-label="历史轮动记录">
        <div class="panel-head">
          <h2>历史记录与每次收益</h2>
          <div class="hint" id="dataStatus">正在读取数据...</div>
        </div>
        <div id="historyWrap" class="table-wrap"></div>
      </section>
      <div id="status" class="status">-</div>
    </main>

    <script>
      const state = {
        funds: [],
        quotes: new Map(),
        trades: [],
      };

      const $ = (id) => document.getElementById(id);
      const STORAGE_KEY = "qdii-etf-monitor-rotation-trades";

      function normalizeCode(code) {
        return String(code || "").replace(/\D/g, "").slice(0, 6);
      }

      function todayText() {
        return new Date().toISOString().slice(0, 10);
      }

      function fmtPrice(value) {
        return Number.isFinite(value) ? Number(value).toFixed(3) : "-";
      }

      function fmtMoney(value) {
        if (!Number.isFinite(value)) return "-";
        const sign = value > 0 ? "+" : value < 0 ? "-" : "";
        return `${sign}${Math.abs(value).toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
      }

      function fmtPct(value) {
        if (!Number.isFinite(value)) return "-";
        const sign = value > 0 ? "+" : "";
        return `${sign}${Number(value).toFixed(2)}%`;
      }

      function signedClass(value) {
        if (!Number.isFinite(value)) return "";
        if (value > 0) return "positive";
        if (value < 0) return "negative";
        return "";
      }

      function secidFor(code) {
        return `${String(code).startsWith("5") ? "1" : "0"}.${code}`;
      }

      function loadJsonp(url, callbackName) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          const timer = setTimeout(() => {
            cleanup();
            reject(new Error("接口超时"));
          }, 9000);
          function cleanup() {
            clearTimeout(timer);
            script.remove();
            delete window[callbackName];
          }
          window[callbackName] = (data) => {
            cleanup();
            resolve(data);
          };
          script.onerror = () => {
            cleanup();
            reject(new Error("接口加载失败"));
          };
          script.src = url;
          document.body.appendChild(script);
        });
      }

      function loadDataScript() {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.onload = () => {
            const data = window.NASDAQ_ETF_FUNDS;
            script.remove();
            if (!Array.isArray(data?.funds) || !data.funds.length) {
              reject(new Error("基础数据为空"));
              return;
            }
            resolve(data);
          };
          script.onerror = () => {
            script.remove();
            reject(new Error("基础数据脚本读取失败"));
          };
          script.src = `./data/funds.js?t=${Date.now()}`;
          document.body.appendChild(script);
        });
      }

      function loadTrades() {
        try {
          const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
          state.trades = Array.isArray(raw) ? raw.filter((item) => item && item.fromCode && item.toCode) : [];
        } catch {
          state.trades = [];
        }
      }

      function saveTrades() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.trades));
      }

      function fundByCode(code) {
        return state.funds.find((fund) => fund.code === String(code));
      }

      function fundLabel(fund) {
        return fund ? `${fund.name} ${fund.code}` : "";
      }

      function currentPrice(code) {
        const fund = fundByCode(code);
        if (!fund) return null;
        return state.quotes.get(code)?.price || fund.latestClose || null;
      }

      function tradeMetrics(trade) {
        const fromCurrent = currentPrice(trade.fromCode);
        const toCurrent = currentPrice(trade.toCode);
        const fromNowValue = Number.isFinite(fromCurrent) ? trade.fromQty * fromCurrent : null;
        const toNowValue = Number.isFinite(toCurrent) ? trade.toQty * toCurrent : null;
        const originalTradeValue = trade.fromQty * trade.fromPrice;
        const switchedTradeValue = trade.toQty * trade.toPrice;
        const cashDiff = originalTradeValue - switchedTradeValue;
        const switchedNowValue = Number.isFinite(toNowValue) ? toNowValue + cashDiff : null;
        const excess = Number.isFinite(switchedNowValue) && Number.isFinite(fromNowValue) ? switchedNowValue - fromNowValue : null;
        const excessPct = Number.isFinite(excess) && fromNowValue > 0 ? (excess / fromNowValue) * 100 : null;
        return { fromCurrent, toCurrent, fromNowValue, switchedNowValue, cashDiff, excess, excessPct };
      }

      function syncFundOptions() {
        const options = state.funds.map((fund) => `<option value="${fund.code}">${fundLabel(fund)}</option>`).join("");
        ["fromCode", "toCode"].forEach((id) => {
          const select = $(id);
          const current = select.value;
          select.innerHTML = options;
          if (current && state.funds.some((fund) => fund.code === current)) select.value = current;
        });
      }

      async function refreshQuotes() {
        state.quotes.clear();
        const secids = state.funds.map((fund) => secidFor(fund.code));
        for (let i = 0; i < secids.length; i += 8) {
          const chunk = secids.slice(i, i + 8);
          const callbackName = `rotationQuote${Date.now()}${Math.floor(Math.random() * 10000)}`;
          const url =
            `https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f12,f14,f2,f3,f6` +
            `&secids=${chunk.join(",")}&cb=${callbackName}`;
          const data = await loadJsonp(url, callbackName);
          (data?.data?.diff || []).forEach((item) => {
            if (item.f12 && item.f2 && item.f2 !== "-") {
              state.quotes.set(String(item.f12).padStart(6, "0"), {
                price: Number(item.f2),
                changePct: Number(item.f3),
              });
            }
          });
        }
      }

      function render() {
        syncFundOptions();
        const rows = state.trades.map((trade) => {
          const fromFund = fundByCode(trade.fromCode);
          const toFund = fundByCode(trade.toCode);
          return {
            trade,
            fromName: fromFund?.name || trade.fromName || trade.fromCode,
            toName: toFund?.name || trade.toName || trade.toCode,
            ...tradeMetrics(trade),
          };
        });
        const totalExcess = rows.reduce((sum, row) => sum + (Number.isFinite(row.excess) ? row.excess : 0), 0);
        const totalBenchmark = rows.reduce((sum, row) => sum + (Number.isFinite(row.fromNowValue) ? row.fromNowValue : 0), 0);
        const totalRate = totalBenchmark > 0 ? (totalExcess / totalBenchmark) * 100 : null;
        $("totalExcess").textContent = state.trades.length ? fmtMoney(totalExcess) : "-";
        $("totalExcess").className = signedClass(totalExcess);
        $("totalRate").textContent = state.trades.length ? fmtPct(totalRate) : "-";
        $("totalRate").className = signedClass(totalRate);
        $("recordCount").textContent = String(state.trades.length);
        $("updated").textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false });

        if (!rows.length) {
          $("historyWrap").innerHTML = `<div class="empty">暂无历史轮动记录。保存第一条记录后，这里会展示每次轮动相对不操作的收益。</div>`;
          return;
        }

        $("historyWrap").innerHTML = `
          <table>
            <thead>
              <tr>
                <th>日期</th>
                <th>原持有</th>
                <th>原数量 / 卖出价</th>
                <th>换入</th>
                <th>换入数量 / 买入价</th>
                <th>现金差额</th>
                <th>原基金当前价</th>
                <th>换入当前价</th>
                <th>不操作当前市值</th>
                <th>轮动后当前市值</th>
                <th>本次超额收益</th>
                <th>本次收益率</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (row) => `
                    <tr>
                      <td>${row.trade.date || "-"}</td>
                      <td><div class="name">${row.fromName}</div><div class="code">${row.trade.fromCode}</div></td>
                      <td>${Number(row.trade.fromQty).toLocaleString("zh-CN")} / ${fmtPrice(row.trade.fromPrice)}</td>
                      <td><div class="name">${row.toName}</div><div class="code">${row.trade.toCode}</div></td>
                      <td>${Number(row.trade.toQty).toLocaleString("zh-CN")} / ${fmtPrice(row.trade.toPrice)}</td>
                      <td class="${signedClass(row.cashDiff)}">${fmtMoney(row.cashDiff)}</td>
                      <td>${fmtPrice(row.fromCurrent)}</td>
                      <td>${fmtPrice(row.toCurrent)}</td>
                      <td>${fmtMoney(row.fromNowValue)}</td>
                      <td>${fmtMoney(row.switchedNowValue)}</td>
                      <td class="${signedClass(row.excess)}">${fmtMoney(row.excess)}</td>
                      <td class="${signedClass(row.excessPct)}">${fmtPct(row.excessPct)}</td>
                      <td><button type="button" class="danger" data-delete="${row.trade.id}">删除</button></td>
                    </tr>
                  `
                )
                .join("")}
            </tbody>
          </table>
        `;
        document.querySelectorAll("[data-delete]").forEach((button) => {
          button.addEventListener("click", () => {
            state.trades = state.trades.filter((trade) => trade.id !== button.dataset.delete);
            saveTrades();
            render();
          });
        });
      }

      function readPositiveNumber(id) {
        const value = Number($(id).value);
        return Number.isFinite(value) && value > 0 ? value : null;
      }

      function addTrade() {
        const fromCode = normalizeCode($("fromCode").value);
        const toCode = normalizeCode($("toCode").value);
        const fromQty = readPositiveNumber("fromQty");
        const fromPrice = readPositiveNumber("fromPrice");
        const toQty = readPositiveNumber("toQty");
        const toPrice = readPositiveNumber("toPrice");
        if (!fromCode || !toCode || !fromQty || !fromPrice || !toQty || !toPrice) {
          $("status").textContent = "请完整填写原持有、原数量、卖出价、换入基金、换入数量和买入价";
          return;
        }
        const fromFund = fundByCode(fromCode);
        const toFund = fundByCode(toCode);
        state.trades.unshift({
          id: `${Date.now()}-${Math.floor(Math.random() * 10000)}`,
          date: $("tradeDate").value || todayText(),
          fromCode,
          fromName: fromFund?.name || "",
          fromQty,
          fromPrice,
          toCode,
          toName: toFund?.name || "",
          toQty,
          toPrice,
        });
        saveTrades();
        ["fromQty", "fromPrice", "toQty", "toPrice"].forEach((id) => ($(id).value = ""));
        $("status").textContent = "轮动记录已保存";
        render();
      }

      function exportCsv() {
        const rows = [["日期", "原持有代码", "原持有名称", "原数量", "卖出价", "换入代码", "换入名称", "换入数量", "买入价", "现金差额", "原基金当前价", "换入当前价", "本次超额收益", "本次收益率"]];
        state.trades.forEach((trade) => {
          const metrics = tradeMetrics(trade);
          rows.push([
            trade.date || "",
            trade.fromCode,
            fundByCode(trade.fromCode)?.name || trade.fromName || "",
            trade.fromQty,
            trade.fromPrice,
            trade.toCode,
            fundByCode(trade.toCode)?.name || trade.toName || "",
            trade.toQty,
            trade.toPrice,
            Number.isFinite(metrics.cashDiff) ? metrics.cashDiff.toFixed(2) : "",
            Number.isFinite(metrics.fromCurrent) ? metrics.fromCurrent.toFixed(3) : "",
            Number.isFinite(metrics.toCurrent) ? metrics.toCurrent.toFixed(3) : "",
            Number.isFinite(metrics.excess) ? metrics.excess.toFixed(2) : "",
            Number.isFinite(metrics.excessPct) ? metrics.excessPct.toFixed(2) + "%" : "",
          ]);
        });
        const csv = rows.map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `rotation-trades-${todayText()}.csv`;
        link.click();
        URL.revokeObjectURL(url);
      }

      async function refreshAll() {
        $("status").textContent = "正在刷新价格...";
        try {
          await refreshQuotes();
          $("dataStatus").textContent = `基础数据 ${state.funds.length} 只；价格已刷新`;
          $("status").textContent = `价格已刷新：${new Date().toLocaleString("zh-CN", { hour12: false })}`;
        } catch (error) {
          $("dataStatus").textContent = "实时价格刷新失败，使用最近收盘价估算";
          $("status").textContent = `实时价格刷新失败：${error.message}`;
        }
        render();
      }

      async function init() {
        $("tradeDate").value = todayText();
        loadTrades();
        const data = await loadDataScript();
        state.funds = data.funds;
        state.funds.sort((a, b) => a.group.localeCompare(b.group) || a.code.localeCompare(b.code));
        render();
        await refreshAll();
        setInterval(refreshAll, 60 * 1000);
      }

      $("addTrade").addEventListener("click", addTrade);
      $("refresh").addEventListener("click", refreshAll);
      $("exportCsv").addEventListener("click", exportCsv);

      init().catch((error) => {
        $("dataStatus").textContent = "数据读取失败";
        $("status").textContent = error.message;
        $("historyWrap").innerHTML = `<div class="empty warn">数据读取失败：${error.message}</div>`;
      });
    </script>
  </body>
</html>
