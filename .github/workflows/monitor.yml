name: Nasdaq ETF Rotation Monitor

on:
  workflow_dispatch:
  schedule:
    # UTC time. Script itself checks Asia/Shanghai A-share trading windows.
    - cron: "1,11,21,31,41,51 1-6 * * 1-5"

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-monitor.txt

      - name: Install dependencies
        run: pip install -r requirements-monitor.txt

      - name: Run monitor
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          CURRENT_HOLDING_CODE: ${{ vars.CURRENT_HOLDING_CODE }}
          SWITCH_THRESHOLD: ${{ vars.SWITCH_THRESHOLD }}
          MIN_AVG7_AMOUNT_WAN: ${{ vars.MIN_AVG7_AMOUNT_WAN }}
          MAX_CANDIDATE_PREMIUM: ${{ vars.MAX_CANDIDATE_PREMIUM }}
          PUSH_COOLDOWN_MINUTES: ${{ vars.PUSH_COOLDOWN_MINUTES }}
        run: python scripts/monitor.py
