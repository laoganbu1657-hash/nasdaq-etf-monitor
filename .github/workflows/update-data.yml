name: Update Nasdaq ETF Premium Data

on:
  workflow_dispatch:
  schedule:
    - cron: "35 0 * * 1-5"
    - cron: "30 11 * * 1-5"

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-update.txt

      - name: Update data
        run: python scripts/update_data.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nasdaq_qdii_live_premium.csv data/summary.csv
          git diff --cached --quiet || git commit -m "Update Nasdaq ETF premium data"
          git push
